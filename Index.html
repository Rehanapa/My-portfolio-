<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Abdur Rahman — Premium Landing Page Designer</title>
    <meta name="description" content="Abdur Rahman builds premium landing pages and websites with HTML, CSS, JS, and modern motion design.">
    <meta property="og:title" content="Abdur Rahman — Premium Landing Page Designer">
    <meta property="og:description" content="Expert web designer crafting modern, cinematic landing pages.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { cream:'#FFF8F0', gold:'#C08552', brown:'#8C5A3C', dark:'#4B2E2B', deep:'#1a0f0d', base:'#0a0706' },
                    fontFamily: { display:['Syne','sans-serif'], body:['"DM Sans"','sans-serif'] }
                }
            }
        }
    </script>
    <style>
        :root{--bg:#0a0706;--bg-el:#1a0f0d;--bg-card:rgba(26,15,13,0.55);--fg:#FFF8F0;--fg-m:rgba(255,248,240,0.55);--acc:#C08552;--acc2:#8C5A3C;--dk:#4B2E2B;--bdr:rgba(192,133,82,0.12);--cbdr:rgba(255,248,240,0.07);--red:#e74c3c;--grn:#27ae60}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--dk) var(--bg)}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden;line-height:1.6;-webkit-text-size-adjust:100%}
        body.scroll-locked{overflow:hidden}
        ::selection{background:var(--acc);color:var(--bg)}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--dk);border-radius:3px}
        img{max-width:100%;display:block}

        #cursorGlow{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(192,133,82,0.07),transparent 70%);pointer-events:none;transform:translate(-50%,-50%);z-index:1;transition:left .15s ease-out,top .15s ease-out;display:none}
        @media(pointer:fine){#cursorGlow{display:block}}

        .bg-atm{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
        .orb{position:absolute;border-radius:50%;filter:blur(100px);will-change:transform}
        .o1{width:500px;height:500px;background:radial-gradient(circle,rgba(192,133,82,0.14),transparent 70%);top:-10%;right:-10%;animation:of1 20s ease-in-out infinite}
        .o2{width:400px;height:400px;background:radial-gradient(circle,rgba(140,90,60,0.11),transparent 70%);bottom:10%;left:-8%;animation:of2 25s ease-in-out infinite}
        .o3{width:300px;height:300px;background:radial-gradient(circle,rgba(75,46,43,0.18),transparent 70%);top:40%;left:30%;animation:of3 18s ease-in-out infinite}
        @keyframes of1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,25px)}}
        @keyframes of2{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,-30px)}}
        @keyframes of3{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,-15px)}}

        .mnav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1rem 1.25rem;transition:background .4s,backdrop-filter .4s,box-shadow .4s}
        .mnav.scrolled{background:rgba(10,7,6,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 1px 0 var(--bdr)}
        .nlink{position:relative;color:var(--fg-m);font-size:.85rem;font-weight:500;transition:color .3s;text-decoration:none}
        .nlink:hover,.nlink.act{color:var(--acc)}
        .nlink::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--acc);border-radius:1px;transition:width .3s}
        .nlink:hover::after,.nlink.act::after{width:100%}

        .mmenu{position:fixed;inset:0;z-index:999;background:rgba(10,7,6,0.97);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;opacity:0;pointer-events:none;transition:opacity .4s}
        .mmenu.open{opacity:1;pointer-events:all}
        .mmenu a{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:700;color:var(--fg);text-decoration:none;transition:color .3s,transform .3s}
        .mmenu a:hover{color:var(--acc);transform:translateX(8px)}

        .hamb{width:32px;height:22px;position:relative;cursor:pointer;z-index:1001;padding:10px;margin:-10px;-webkit-tap-highlight-color:transparent}
        .hamb span{display:block;position:absolute;height:2px;width:100%;background:var(--fg);border-radius:2px;transition:all .3s;left:0}
        .hamb span:nth-child(1){top:0}.hamb span:nth-child(2){top:10px}.hamb span:nth-child(3){bottom:0}
        .hamb.act span:nth-child(1){top:10px;transform:rotate(45deg)}.hamb.act span:nth-child(2){opacity:0}.hamb.act span:nth-child(3){bottom:10px;transform:rotate(-45deg)}

        .slbl{font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--acc);margin-bottom:.75rem}
        .shdr{font-family:'Syne',sans-serif;font-size:clamp(1.75rem,5vw,3rem);font-weight:800;color:var(--fg);line-height:1.1;margin-bottom:1.25rem}
        .sdsc{color:var(--fg-m);font-size:.95rem;max-width:520px;line-height:1.7}

        .bp{position:relative;display:inline-flex;align-items:center;gap:.5rem;padding:.8rem 1.75rem;background:var(--acc);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;border:none;border-radius:12px;cursor:pointer;text-decoration:none;overflow:hidden;transition:transform .3s,box-shadow .3s;-webkit-tap-highlight-color:transparent}
        .bp:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(192,133,82,0.35)}
        .bp:active{transform:translateY(0)!important;box-shadow:0 4px 15px rgba(192,133,82,0.2)!important}
        .bp::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(to right,transparent 0%,rgba(255,255,255,0.2) 50%,transparent 100%);transform:rotate(25deg) translateX(-120%);transition:transform .7s}
        .bp:hover::after{transform:rotate(25deg) translateX(120%)}
        .bo{display:inline-flex;align-items:center;gap:.5rem;padding:.8rem 1.75rem;background:transparent;color:var(--fg);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;border:1px solid var(--cbdr);border-radius:12px;cursor:pointer;text-decoration:none;transition:border-color .3s,color .3s,transform .3s;-webkit-tap-highlight-color:transparent}
        .bo:hover{border-color:var(--acc);color:var(--acc);transform:translateY(-2px)}
        .bo:active{transform:translateY(0)!important}
        .bs{padding:.6rem 1.25rem;font-size:.8rem;border-radius:10px}

        .htitle{font-family:'Syne',sans-serif;font-size:clamp(2rem,7vw,4rem);font-weight:800;line-height:1.08;color:var(--fg)}
        .htitle .acc{color:var(--acc)}
        .trl{display:block;clip-path:inset(100% 0 0 0);animation:ru .9s cubic-bezier(.16,1,.3,1) forwards}
        .trl:nth-child(2){animation-delay:.15s}.trl:nth-child(3){animation-delay:.3s}
        @keyframes ru{to{clip-path:inset(0 0 0 0)}}
        .hsub{opacity:0;transform:translateY(20px);animation:fu .8s ease .5s forwards}
        .hcta{opacity:0;transform:translateY(20px);animation:fu .8s ease .7s forwards}
        @keyframes fu{to{opacity:1;transform:translateY(0)}}

        .hvis{perspective:1200px;position:relative;width:280px;height:380px}
        .fc{position:absolute;border-radius:16px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--cbdr);overflow:hidden}
        .fc1{width:250px;height:320px;background:linear-gradient(145deg,rgba(192,133,82,0.08),rgba(26,15,13,0.5));transform:rotateY(-14deg) rotateX(8deg);animation:hf 6s ease-in-out infinite}
        .fc2{width:230px;height:300px;background:linear-gradient(145deg,rgba(140,90,60,0.1),rgba(26,15,13,0.6));transform:rotateY(-8deg) rotateX(4deg) translateZ(50px) translate(25px,-12px);animation:hf 6s ease-in-out infinite .6s}
        .fc3{width:210px;height:280px;background:linear-gradient(145deg,rgba(255,248,240,0.03),rgba(75,46,43,0.2));transform:rotateY(-3deg) rotateX(1deg) translateZ(100px) translate(45px,-24px);animation:hf 6s ease-in-out infinite 1.2s}
        @keyframes hf{0%,100%{transform:rotateY(-14deg) rotateX(8deg) translateZ(0) translateY(0)}50%{transform:rotateY(-14deg) rotateX(8deg) translateZ(0) translateY(-12px)}}
        .fl{height:7px;border-radius:4px;background:rgba(192,133,82,0.12);margin:7px 18px}.fl.sh{width:60%}.fl.md{width:80%}.fl.lg{width:90%}
        .fd{width:9px;height:9px;border-radius:50%;display:inline-block;margin:0 2px}

        .rv{opacity:0;transform:translateY(35px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
        .rv.vis{opacity:1;transform:translateY(0)}
        .rd1{transition-delay:.1s}.rd2{transition-delay:.2s}.rd3{transition-delay:.3s}.rd4{transition-delay:.4s}

        .skc{padding:1.25rem;background:var(--bg-card);border:1px solid var(--cbdr);border-radius:14px;text-align:center;transition:border-color .4s,transform .4s,box-shadow .4s}
        .skc:hover{border-color:rgba(192,133,82,0.3);transform:translateY(-5px);box-shadow:0 10px 35px rgba(192,133,82,0.1)}
        .ski{width:44px;height:44px;margin:0 auto .65rem;display:flex;align-items:center;justify-content:center;border-radius:11px;font-size:1.15rem;background:rgba(192,133,82,0.1);color:var(--acc)}

        .pcard{position:relative;border-radius:18px;overflow:hidden;background:var(--bg-card);border:1px solid var(--cbdr);transition:box-shadow .4s;will-change:transform}
        .pcard:hover{box-shadow:0 16px 50px rgba(192,133,82,0.1)}
        .ppw{width:100%;height:220px;position:relative;overflow:hidden;background:var(--bg-el)}
        @media(min-width:768px){.ppw{height:280px}}
        .ppw iframe{width:200%;height:200%;border:none;transform:scale(0.5);transform-origin:top left;pointer-events:none}
        .ppimg{position:absolute;inset:0;z-index:2;transition:opacity .5s}
        .ppimg img{width:100%;height:100%;object-fit:cover}
        .ppimg.hid{opacity:0;pointer-events:none}
        .ppov{position:absolute;inset:0;z-index:3;background:linear-gradient(to top,rgba(10,7,6,0.9) 0%,rgba(10,7,6,0.25) 40%,transparent 70%)}
        .ppctrl{position:absolute;top:10px;right:10px;z-index:5;display:flex;gap:6px}
        .pbs{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,248,240,0.15);background:rgba(10,7,6,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:var(--fg);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .3s,border-color .3s;-webkit-tap-highlight-color:transparent}
        .pbs:hover,.pbs:active{background:rgba(192,133,82,0.2);border-color:var(--acc)}
        .pbs.actp{background:rgba(192,133,82,0.25);border-color:var(--acc);color:var(--acc)}
        .ttag{display:inline-block;padding:.2rem .6rem;font-size:.65rem;font-weight:600;letter-spacing:.04em;border-radius:6px;background:rgba(192,133,82,0.12);color:var(--acc);border:1px solid rgba(192,133,82,0.15)}

        .svcc{padding:1.5rem;border-radius:16px;background:var(--bg-card);border:1px solid var(--cbdr);transition:border-color .4s,transform .4s,box-shadow .4s}
        .svcc:hover{border-color:rgba(192,133,82,0.25);transform:translateY(-4px);box-shadow:0 14px 40px rgba(192,133,82,0.08)}
        .svci{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:rgba(192,133,82,0.08);color:var(--acc);font-size:1.1rem;margin-bottom:1rem}

        .pstep{position:relative;flex:1;text-align:center;padding:0 .4rem}
        .pnum{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;background:var(--bg-card);border:2px solid var(--cbdr);color:var(--fg);transition:border-color .5s,color .5s,box-shadow .5s}
        .pstep.act .pnum,.pstep-m.act .pnum{border-color:var(--acc);color:var(--acc);box-shadow:0 0 20px rgba(192,133,82,0.2)}
        .pline{position:absolute;top:25px;left:calc(50% + 32px);width:calc(100% - 64px);height:2px;background:var(--cbdr)}
        .plfill{height:100%;width:0;background:var(--acc);border-radius:1px;transition:width .8s ease}
        .pstep.act .plfill{width:100%}

        .tcard{padding:1.5rem;border-radius:16px;background:var(--bg-card);border:1px solid var(--cbdr);transition:border-color .4s,transform .4s}
        .tcard:hover{border-color:rgba(192,133,82,0.2);transform:translateY(-3px)}
        .tstars{color:var(--acc);font-size:.75rem;margin-bottom:.75rem;letter-spacing:2px}

        .ctasec{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(192,133,82,0.08),rgba(26,15,13,0.6));border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr)}
        .ctaglow{position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(192,133,82,0.12),transparent 70%);filter:blur(60px);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
        .stnum{font-family:'Syne',sans-serif;font-size:clamp(1.75rem,4vw,2.5rem);font-weight:800;color:var(--acc);line-height:1}
        .scind{opacity:0;animation:fu .8s ease 1.2s forwards}
        .scline{width:1px;height:45px;background:var(--cbdr);position:relative;overflow:hidden;margin:0 auto}
        .scline::after{content:'';position:absolute;top:-100%;left:0;width:100%;height:50%;background:var(--acc);animation:scp 2s ease-in-out infinite}
        @keyframes scp{0%{top:-50%}100%{top:150%}}
        .aavt{width:160px;height:160px;border-radius:22px;background:linear-gradient(145deg,rgba(192,133,82,0.15),rgba(75,46,43,0.3));border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;color:var(--acc);position:relative;overflow:hidden}
        @media(min-width:768px){.aavt{width:200px;height:200px;font-size:3.5rem}}
        .aavt::after{content:'';position:absolute;inset:-2px;border-radius:24px;background:conic-gradient(from 0deg,transparent,var(--acc),transparent,transparent);z-index:-1;animation:ag 6s linear infinite;opacity:.4}
        @keyframes ag{to{transform:rotate(360deg)}}
        .fdiv{height:1px;background:linear-gradient(to right,transparent,var(--bdr),transparent)}

        .pmodal{position:fixed;inset:0;z-index:2000;display:flex;flex-direction:column;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .4s}
        .pmodal.open{opacity:1;pointer-events:all}
        .pmbar{height:52px;flex-shrink:0;display:flex;align-items:center;gap:8px;padding:0 1rem;background:var(--bg-el);border-bottom:1px solid var(--bdr)}
        .pmbar .dots{display:flex;gap:5px;flex-shrink:0}.pmbar .dots div{width:10px;height:10px;border-radius:50%}
        .pmurl{flex:1;padding:.45rem .8rem;border-radius:8px;background:rgba(255,248,240,0.04);border:1px solid var(--cbdr);color:var(--fg-m);font-size:.75rem;font-family:'DM Sans',sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
        .pmbar button{width:34px;height:34px;border-radius:9px;border:1px solid var(--cbdr);background:transparent;color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;transition:background .3s,border-color .3s;-webkit-tap-highlight-color:transparent}
        .pmbar button:hover,.pmbar button:active{background:rgba(192,133,82,0.15);border-color:var(--acc)}
        .pmbar .clsbtn:hover,.pmbar .clsbtn:active{background:rgba(231,76,60,0.15);border-color:var(--red);color:var(--red)}
        .pmiframe{flex:1;width:100%;border:none;background:#fff}

        .aoverlay{position:fixed;inset:0;z-index:3000;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .4s;overflow-y:auto;-webkit-overflow-scrolling:touch}
        .aoverlay.open{opacity:1;pointer-events:all}
        .alogin{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
        .albox{width:100%;max-width:380px;padding:2rem;border-radius:18px;background:var(--bg-card);border:1px solid var(--cbdr);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
        .ainp{width:100%;padding:.75rem 1rem;border-radius:10px;border:1px solid var(--cbdr);background:rgba(255,248,240,0.04);color:var(--fg);font-family:'DM Sans',sans-serif;font-size:.9rem;transition:border-color .3s;outline:none;-webkit-appearance:none;appearance:none}
        .ainp:focus{border-color:var(--acc)}
        .ainp::placeholder{color:var(--fg-m)}
        .atxta{resize:vertical;min-height:70px}
        .albl{display:block;font-size:.75rem;font-weight:600;color:var(--fg-m);margin-bottom:.35rem;letter-spacing:.04em}
        .acard{padding:1.25rem;border-radius:14px;background:var(--bg-card);border:1px solid var(--cbdr)}
        .awitem{display:flex;align-items:center;gap:.75rem;padding:.85rem;border-radius:12px;background:rgba(255,248,240,0.02);border:1px solid var(--cbdr);transition:border-color .3s}
        .awitem:hover{border-color:rgba(192,133,82,0.2)}

        .tst{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);z-index:9999;padding:.8rem 1.5rem;border-radius:12px;font-size:.85rem;font-weight:500;color:var(--fg);background:var(--bg-el);border:1px solid var(--bdr);box-shadow:0 10px 35px rgba(0,0,0,0.5);opacity:0;transition:all .4s;pointer-events:none;white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden}
        .tst.show{transform:translateX(-50%) translateY(0);opacity:1}
        .tst.ok{border-color:rgba(39,174,96,0.3)}.tst.err{border-color:rgba(231,76,60,0.3)}

        @media(max-width:767px){.ppctrl{top:8px;right:8px;gap:5px}.pbs{width:32px;height:32px;font-size:.7rem;border-radius:8px}.ttag{font-size:.6rem;padding:.15rem .5rem}.mnav{padding:.85rem 1rem}}
        @media(max-width:400px){.htitle{font-size:1.85rem}.bp,.bo{padding:.7rem 1.4rem;font-size:.8rem}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}.rv{opacity:1;transform:none}.trl{clip-path:inset(0 0 0 0)}.hsub,.hcta,.scind{opacity:1;transform:none}}
    </style>
</head>
<body class="font-body">

<div id="cursorGlow" aria-hidden="true"></div>
<div class="bg-atm" aria-hidden="true"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<nav class="mnav" role="navigation" aria-label="Main navigation">

        .pbs:hover,.pbs:active{background:rgba(192,133,82,0.2);border-color:var(--acc)}
        .pbs.actp{background:rgba(192,133,82,0.25);border-color:var(--acc);color:var(--acc)}
        .ttag{display:inline-block;padding:.2rem .6rem;font-size:.65rem;font-weight:600;letter-spacing:.04em;border-radius:6px;background:rgba(192,133,82,0.12);color:var(--acc);border:1px solid rgba(192,133,82,0.15)}
        .svcc{padding:1.5rem;border-radius:16px;background:var(--bg-card);border:1px solid var(--cbdr);transition:border-color .4s,transform .4s,box-shadow .4s}
